// ── Gemini API via REST fetch (no SDK needed) ──────────────────────────────
async function callGemini(apiKey, prompt) {
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }),
  });
  if (!res.ok) throw new Error(`Gemini API error: ${res.status} ${res.statusText}`);
  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '';
}

async function getVisibleObjects(location, date, time, catalog, apiKey) {
  if (!apiKey) throw new Error('API key not set. Add your Gemini key in Settings.');
  const prompt = `You are an expert astronomer. Given these details:
Location: ${location}
Date: ${date}
Time: ${time}
Catalog: ${catalog}

List 8 interesting celestial objects visible from this location. Respond ONLY with a JSON array, no markdown, no extra text. Each item must have:
- name (string)
- type (one of: Star, Galaxy, Nebula, Planet, Comet, Asteroid, Cluster, BlackHole, Pulsar, Other)
- magnitude (string)
- distanceValue (string)
- distanceUnit (one of: LightYears, Parsecs, AU, Km, MillionLightYears)
- constellation (string)
- description (string, 1-2 sentences)
- imageUrl (string, a real Wikipedia Commons or NASA URL)`;
  const text = await callGemini(apiKey, prompt);
  const clean = text.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
  return JSON.parse(clean);
}

// ── ImageViewer ────────────────────────────────────────────────────────────
const ImageViewer = ({ src, alt, onClose }) => {
  const [scale, setScale] = useState(1);
  const [pos, setPos] = useState({ x: 0, y: 0 });
  const [dragging, setDragging] = useState(false);
  const [start, setStart] = useState({ x: 0, y: 0 });
  return (
    <div className="fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center z-50"
      onWheel={e => { e.preventDefault(); setScale(s => Math.max(0.5, Math.min(5, s - e.deltaY * 0.001))); }}
      onMouseDown={e => { setDragging(true); setStart({ x: e.clientX - pos.x, y: e.clientY - pos.y }); }}
      onMouseMove={e => { if (dragging) setPos({ x: e.clientX - start.x, y: e.clientY - start.y }); }}
      onMouseUp={() => setDragging(false)}
      onClick={onClose}>
      <button className="absolute top-4 right-4 text-white text-3xl z-10" onClick={onClose}>✕</button>
      <img src={src} alt={alt} draggable={false} onClick={e => e.stopPropagation()}
        style={{ transform: `translate(${pos.x}px,${pos.y}px) scale(${scale})`,
          cursor: dragging ? 'grabbing' : 'grab', maxWidth: '90vw', maxHeight: '90vh', userSelect: 'none' }} />
    </div>
  );
};

// ── ObservationsPage ───────────────────────────────────────────────────────
const ObservationsPage = ({ observations, setObservations }) => {
  const [filter, setFilter] = useState('');
  const [typeFilter, setTypeFilter] = useState('All');
  const [showForm, setShowForm] = useState(false);
  const [editObs, setEditObs] = useState(null);
  const [detailObs, setDetailObs] = useState(null);

  const filtered = useMemo(() => observations.filter(o =>
    (o.objectName.toLowerCase().includes(filter.toLowerCase()) || o.description?.toLowerCase().includes(filter.toLowerCase())) &&
    (typeFilter === 'All' || o.type === typeFilter)
  ), [observations, filter, typeFilter]);

  const handleSave = obs => {
    setObservations(prev => prev.find(o => o.id === obs.id) ? prev.map(o => o.id === obs.id ? obs : o) : [...prev, obs]);
    setShowForm(false); setEditObs(null);
  };

  return (
    <div className="space-y-6">
      <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
        <div>
          <h2 className="text-3xl font-bold text-white">My Observations</h2>
          <p className="text-slate-400 mt-1">{filtered.length} of {observations.length} objects</p>
        </div>
        <button onClick={() => { setEditObs(null); setShowForm(true); }}
          className="bg-cyan-600 hover:bg-cyan-700 text-white font-bold px-4 py-2 rounded-md">+ Add Observation</button>
      </div>
      <div className="flex flex-col sm:flex-row gap-3">
        <input value={filter} onChange={e => setFilter(e.target.value)} placeholder="Search..."
          className="flex-1 bg-slate-700 border border-slate-600 rounded-md p-2 text-white focus:outline-none focus:border-cyan-500" />
        <select value={typeFilter} onChange={e => setTypeFilter(e.target.value)}
          className="bg-slate-700 border border-slate-600 rounded-md p-2 text-white">
          <option value="All">All Types</option>
          {Object.values(ObjectType).map(t => <option key={t}>{t}</option>)}
        </select>
      </div>
      {filtered.length === 0
        ? <div className="text-center py-20 text-slate-400"><p className="text-4xl mb-4">🔭</p><p>No observations found.</p></div>
        : <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
            {filtered.map(obs => (
              <ObservationCard key={obs.id} observation={obs} onClick={() => setDetailObs(obs)}
                onEdit={o => { setEditObs(o); setShowForm(true); }}
                onToggleFavorite={id => setObservations(prev => prev.map(o => o.id === id ? { ...o, isFavorite: !o.isFavorite } : o))} />
            ))}
          </div>}
      {showForm && <AddObservationForm observation={editObs} onSave={handleSave} onClose={() => { setShowForm(false); setEditObs(null); }} />}
      {detailObs && <ObservationDetailModal observation={detailObs} onClose={() => setDetailObs(null)}
        onEdit={o => { setDetailObs(null); setEditObs(o); setShowForm(true); }} />}
    </div>
  );
};

          <div>
            <label className="text-sm text-slate-300 block mb-1">Catalog</label>
            <select value={catalog} onChange={e => setCatalog(e.target.value)} className="w-full bg-slate-700 border border-slate-600 rounded p-2 text-white">
              {ASTRONOMICAL_CATALOGS.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
          </div>
          <div>
            <label className="text-sm text-slate-300 block mb-1">Date</label>
            <input type="date" value={date} onChange={e => setDate(e.target.value)}
              className="w-full bg-slate-700 border border-slate-600 rounded p-2 text-white focus:outline-none focus:border-cyan-500" />
          </div>
          <div>
            <label className="text-sm text-slate-300 block mb-1">Time</label>
            <input type="time" value={time} onChange={e => setTime(e.target.value)}
              className="w-full bg-slate-700 border border-slate-600 rounded p-2 text-white focus:outline-none focus:border-cyan-500" />
          </div>
        </div>
        {error && <p className="text-red-400 text-sm">{error}</p>}
        <button type="submit" disabled={loading || !apiKey}
          className="w-full bg-cyan-600 hover:bg-cyan-700 disabled:bg-slate-600 disabled:cursor-not-allowed text-white font-bold py-2 rounded-md">
          {loading ? '🔍 Searching...' : '🔭 Find Visible Objects'}
        </button>
      </form>
      {results.length > 0 && (
        <div>
          <h3 className="text-xl font-semibold text-white mb-4">Results ({results.length})</h3>
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
            {results.map((obj, i) => <VisibleObjectCard key={i} obj={obj} onAdd={handleAddToLog} />)}
          </div>
        </div>
      )}
    </div>
  );
};

// ── ResourcesPage ──────────────────────────────────────────────────────────
const getMoonPhase = () => {
  const known = new Date(2000, 0, 6);
  const diff = (new Date() - known) / 86400000;
  const phase = ((diff % 29.53058867) + 29.53058867) % 29.53058867;
  if (phase < 1.85)  return { emoji: '🌑', name: 'New Moon' };
  if (phase < 7.38)  return { emoji: '🌒', name: 'Waxing Crescent' };
  if (phase < 9.22)  return { emoji: '🌓', name: 'First Quarter' };
  if (phase < 14.77) return { emoji: '🌔', name: 'Waxing Gibbous' };
  if (phase < 16.61) return { emoji: '🌕', name: 'Full Moon' };
  if (phase < 22.15) return { emoji: '🌖', name: 'Waning Gibbous' };
  if (phase < 23.99) return { emoji: '🌗', name: 'Last Quarter' };
  return { emoji: '🌘', name: 'Waning Crescent' };
};

  const moon = getMoonPhase();
  return (
    <div className="space-y-8">
      <div>
        <h2 className="text-3xl font-bold text-white">Resources</h2>
        <p className="text-slate-300 mt-2">Tools and links for astronomers.</p>
      </div>
      <div className="bg-slate-800 p-6 rounded-lg shadow-lg">
        <h3 className="text-xl font-semibold text-cyan-400 mb-4">Current Moon Phase</h3>
        <div className="flex items-center gap-4">
          <span className="text-6xl">{moon.emoji}</span>
          <div>
            <p className="text-2xl font-bold text-white">{moon.name}</p>
            <p className="text-slate-400 text-sm">Approximate phase for today</p>
          </div>
        </div>
      </div>
      <div className="bg-slate-800 p-6 rounded-lg shadow-lg">
        <h3 className="text-xl font-semibold text-cyan-400 mb-4">Astronomy Links</h3>
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
          {ASTRONOMY_LINKS.map(link => (
            <a key={link.name} href={link.url} target="_blank" rel="noopener noreferrer"
              className="flex items-start gap-3 p-3 bg-slate-700 hover:bg-slate-600 rounded-lg transition-colors group">
              <span className="text-xl">🔗</span>
              <div>
                <p className="font-semibold text-white group-hover:text-cyan-400">{link.name}</p>
                <p className="text-slate-400 text-sm">{link.description}</p>

      </div>
      <div className="bg-slate-800 p-6 rounded-lg shadow-lg">
        <h3 className="text-xl font-semibold text-cyan-400 mb-4">Seeing Forecast</h3>
        <iframe
          src="https://www.meteoblue.com/en/weather/outdoorsports/seeing/lisbon_portugal_2267057?utm_source=seeing_widget&utm_medium=linkus&utm_content=seeing&utm_campaign=Weather%2BWidget"
          frameBorder="0" scrolling="NO" allowTransparency={true}

// ── CalendarPage ───────────────────────────────────────────────────────────
const DayDetailsModal = ({ date, event, observations, onClose }) => (
  <div className="fixed inset-0 bg-black bg-opacity-75 flex justify-center items-center z-50 p-4" onClick={onClose}>
    <div className="bg-slate-800 rounded-lg shadow-2xl w-full max-w-md max-h-[90vh] overflow-y-auto p-6" onClick={e => e.stopPropagation()}>
      <div className="flex justify-between items-center mb-4">
        <h3 className="text-xl font-bold text-white">{new Date(date + 'T00:00:00').toLocaleDateString(undefined, { year: 'numeric', month: 'long', day: 'numeric' })}</h3>
        <button onClick={onClose} className="text-slate-400 hover:text-white">✕</button>
      </div>
      {event && <div className="mb-4"><p className="text-purple-400 font-semibold">{event.name}</p><p className="text-sm text-slate-300">{event.description}</p></div>}
      {observations.length > 0 && (
        <div>
          <p className="text-cyan-400 font-semibold mb-2">Your Observations</p>
          {observations.map(o => (
            <div key={o.id} className="text-sm text-slate-200 p-2 bg-slate-700/50 rounded mb-1">
              <span className="font-bold">{o.objectName}</span> ({o.type})
            </div>
          ))}
        </div>
      )}
    </div>
  </div>
);

const CalendarPage = ({ observations }) => {
  const [currentDate, setCurrentDate] = useState(new Date());
  const [selectedDate, setSelectedDate] = useState(null);

  const observationDates = useMemo(() => {
    const s = new Set();
    observations.forEach(o => {
      if (o.observationDate && o.observationDate.length >= 8) {
        s.add(`${o.observationDate.slice(4,8)}-${o.observationDate.slice(2,4)}-${o.observationDate.slice(0,2)}`);
      }
    });
    return s;
  }, [observations]);

  const eventDates = useMemo(() => {
    const m = new Map(); ASTRO_EVENTS.forEach(e => m.set(e.date, e)); return m;
  }, []);

  const upcomingEvents = useMemo(() => {
    const today = new Date(); today.setHours(0,0,0,0);
    const limit = new Date(today); limit.setMonth(today.getMonth() + 4);
    return ASTRO_EVENTS.filter(e => { const d = new Date(e.date + 'T00:00:00'); return d >= today && d <= limit; });
  }, []);

  const month = currentDate.getMonth(), year = currentDate.getFullYear();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  return (
    <div className="space-y-8">
      <div>
        <h2 className="text-3xl font-bold text-white">Celestial Calendar</h2>
        <p className="text-slate-300 mt-2">Track major events and your observation history.</p>
      </div>
      <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div className="lg:col-span-2 bg-slate-800 p-6 rounded-lg shadow-lg">
          <div className="flex justify-between items-center mb-4">
            <button onClick={() => setCurrentDate(new Date(year, month - 1, 1))} className="p-2 rounded-full hover:bg-slate-700">‹</button>
            <h3 className="text-xl font-semibold text-cyan-400">{currentDate.toLocaleString('default', { month: 'long' })} {year}</h3>
            <button onClick={() => setCurrentDate(new Date(year, month + 1, 1))} className="p-2 rounded-full hover:bg-slate-700">›</button>
          </div>
          <div className="grid grid-cols-7 gap-1 text-center">
            {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => <div key={d} className="font-bold text-slate-400 text-sm">{d}</div>)}
            {Array.from({ length: firstDay }).map((_, i) => <div key={`b${i}`}></div>)}
            {Array.from({ length: daysInMonth }, (_, i) => i + 1).map(day => {
              const ds = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
              const isObs = observationDates.has(ds), ev = eventDates.get(ds);
              let cls = "h-14 flex items-center justify-center text-sm rounded-lg transition-colors ";
              if (isObs && ev) cls += "bg-gradient-to-br from-purple-500 to-cyan-500 text-white font-bold cursor-pointer";
              else if (isObs) cls += "bg-cyan-600/70 hover:bg-cyan-500 text-white cursor-pointer";
              else if (ev)    cls += "bg-purple-600/70 hover:bg-purple-500 text-white cursor-pointer";
              else            cls += "bg-slate-700/50 text-slate-300";
              return <div key={day} className={cls} title={ev?.name} onClick={() => (isObs||ev) && setSelectedDate(ds)}>{day}</div>;
            })}
          </div>
          <div className="mt-4 flex gap-4 text-sm text-slate-300 flex-wrap">
            <span className="flex items-center gap-2"><span className="w-4 h-4 rounded bg-cyan-600/70 inline-block"></span>Observation</span>
            <span className="flex items-center gap-2"><span className="w-4 h-4 rounded bg-purple-600/70 inline-block"></span>Event</span>
          </div>
        </div>
        <div className="bg-slate-800 p-6 rounded-lg shadow-lg max-h-[600px] overflow-y-auto">
          <h3 className="text-xl font-semibold text-cyan-400 mb-4">Upcoming Events</h3>
          <ul className="space-y-4">
            {upcomingEvents.map(ev => (
              <li key={ev.name} className="border-l-4 border-purple-500 pl-4">
                <p className="font-bold text-slate-100">{ev.name}</p>
                <p className="text-sm text-slate-400">{new Date(ev.date + 'T00:00:00').toLocaleDateString(undefined, { month: 'long', day: 'numeric', year: 'numeric' })}</p>
                <p className="text-sm text-slate-300 mt-1">{ev.description}</p>
              </li>
            ))}
          </ul>
        </div>
      </div>
      {selectedDate && (
        <DayDetailsModal date={selectedDate} event={eventDates.get(selectedDate)}
          observations={observations.filter(o => o.observationDate && o.observationDate.length >= 8 &&
            `${o.observationDate.slice(4,8)}-${o.observationDate.slice(2,4)}-${o.observationDate.slice(0,2)}` === selectedDate)}
          onClose={() => setSelectedDate(null)} />
      )}
    </div>
  );
};

// ── SettingsPage ───────────────────────────────────────────────────────────
const SettingsPage = ({ observations, setObservations, apiKey, setApiKey }) => {
  const fileInputRef = useRef(null);
  const [keyInput, setKeyInput] = useState(apiKey || '');

  const handleExport = () => {
    const a = document.createElement('a');
    a.href = 'data:application/json;charset=utf-8,' + encodeURIComponent(JSON.stringify(observations, null, 2));
    a.download = 'AstroLog_Observations.json';
    a.click();
  };

  const handleImport = e => {
    const file = e.target.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!Array.isArray(data)) throw new Error('Not an array');
        setObservations(data); alert(`${data.length} observations loaded!`);
      } catch (err) { alert('Failed to load: ' + err.message); }
      if (fileInputRef.current) fileInputRef.current.value = '';
    };
    reader.readAsText(file);
  };

  const handleSaveKey = () => {
    const k = keyInput.trim(); setApiKey(k);
    try { localStorage.setItem('gemini_api_key', k); } catch {}
    alert('API key saved!');
  };

  return (
    <div className="space-y-8 max-w-2xl mx-auto">
      <div>
        <h2 className="text-3xl font-bold text-white">Settings</h2>
        <p className="text-slate-300 mt-2">Manage data and preferences.</p>
      </div>
      <div className="bg-slate-800 p-6 rounded-lg shadow-lg space-y-4">
        <h3 className="text-xl font-semibold text-cyan-400">Gemini API Key</h3>
        <p className="text-slate-400 text-sm">Required for "What's Visible Tonight?". Get a free key at <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener noreferrer" className="text-cyan-400 underline">Google AI Studio</a>.</p>
        <div className="flex gap-2">
          <input type="password" value={keyInput} onChange={e => setKeyInput(e.target.value)} placeholder="AIza..."
            className="flex-1 bg-slate-700 border border-slate-600 rounded p-2 text-white focus:outline-none focus:border-cyan-500" />
          <button onClick={handleSaveKey} className="bg-cyan-600 hover:bg-cyan-700 text-white px-4 py-2 rounded">Save</button>
        </div>
        {apiKey && <p className="text-green-400 text-sm">✓ API key is set</p>}
      </div>
      <div className="bg-slate-800 p-6 rounded-lg shadow-lg space-y-4">
        <h3 className="text-xl font-semibold text-cyan-400">Data Management</h3>
        <div className="flex flex-col sm:flex-row gap-4">
          <button onClick={handleExport} className="flex-1 bg-cyan-600 hover:bg-cyan-700 text-white font-bold py-2 px-4 rounded-md">Save to File</button>
          <button onClick={() => fileInputRef.current?.click()} className="flex-1 bg-slate-600 hover:bg-slate-500 text-white font-bold py-2 px-4 rounded-md">Load from File</button>
          <input type="file" ref={fileInputRef} onChange={handleImport} accept=".json" className="hidden" />
        </div>
      </div>
    </div>
  );
};

// ── App ────────────────────────────────────────────────────────────────────
const App = () => {
  const [activeTab, setActiveTab] = useState(Tab.Home);
  const [observations, setObservations] = useState(() => {
    try { const s = localStorage.getItem('astrolog_observations'); return s ? JSON.parse(s) : INITIAL_OBSERVATIONS; } catch { return INITIAL_OBSERVATIONS; }
  });
  const [apiKey, setApiKey] = useState(() => { try { return localStorage.getItem('gemini_api_key') || ''; } catch { return ''; } });

  useEffect(() => {
    try { localStorage.setItem('astrolog_observations', JSON.stringify(observations)); } catch {}
  }, [observations]);

  const renderTab = () => {
    switch (activeTab) {
      case Tab.Home:         return <HomePage observations={observations} setObservations={setObservations} apiKey={apiKey} />;
      case Tab.Observations: return <ObservationsPage observations={observations} setObservations={setObservations} />;
      case Tab.Resources:    return <ResourcesPage />;
      case Tab.Calendar:     return <CalendarPage observations={observations} />;
      case Tab.Settings:     return <SettingsPage observations={observations} setObservations={setObservations} apiKey={apiKey} setApiKey={setApiKey} />;
      default: return null;
    }
  };

  return (
    <div className="min-h-screen bg-slate-900">
      <Header activeTab={activeTab} setActiveTab={setActiveTab} />
      <main className="max-w-7xl mx-auto px-4 py-8">{renderTab()}</main>
    </div>
  );
};

// ── Render ─────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
