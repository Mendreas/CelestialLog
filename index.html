// ── services/geminiService.ts ──────────────────────────────────────────────
async function getVisibleObjects(location, date, time, catalog, apiKey) {
  if (!apiKey) throw new Error('API key not set. Please add your Gemini API key in Settings.');
  const { GoogleGenAI } = await import('https://esm.sh/@google/genai@^1.12.0');
  const genAI = new GoogleGenAI({ apiKey });
  const prompt = `You are an expert astronomer. Given the following observation details, provide a list of interesting celestial objects that would be visible.
Location: ${location}
Date: ${date}
Time: ${time}
Catalog: ${catalog}

Please respond with a JSON array of objects. Each object should have these fields:
- name (string): the common name
- type (string): one of Star, Galaxy, Nebula, Planet, Comet, Asteroid, Cluster, BlackHole, Pulsar, Other
- magnitude (string): apparent magnitude
- distanceValue (string): numeric distance value
- distanceUnit (string): one of LightYears, Parsecs, AU, Km, MillionLightYears
- constellation (string): constellation it's in
- description (string): brief interesting description (1-2 sentences)
- imageUrl (string): a real URL to a Wikipedia Commons or NASA image of this object

Respond ONLY with the JSON array, no markdown, no explanation.`;

  const response = await genAI.models.generateContent({
    model: 'gemini-2.5-flash',
    contents: prompt,
  });
  const text = response.text();
  const clean = text.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
  return JSON.parse(clean);
}

async function getLocationSuggestions(query, apiKey) {
  if (!apiKey) return [];
  const { GoogleGenAI } = await import('https://esm.sh/@google/genai@^1.12.0');
  const genAI = new GoogleGenAI({ apiKey });
  const prompt = `Suggest 5 astronomy observation locations matching: "${query}". Return a JSON array of strings (location names only). No markdown.`;
  const response = await genAI.models.generateContent({
    model: 'gemini-2.5-flash',
    contents: prompt,
  });
  const text = response.text();
  const clean = text.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
  return JSON.parse(clean);
}

// ── components/ImageViewer ─────────────────────────────────────────────────
const ImageViewer = ({ src, alt, onClose }) => {
  const [scale, setScale] = useState(1);
  const [pos, setPos] = useState({ x: 0, y: 0 });
  const [dragging, setDragging] = useState(false);
  const [startPos, setStartPos] = useState({ x: 0, y: 0 });

  const handleWheel = (e) => {
    e.preventDefault();
    setScale(s => Math.max(0.5, Math.min(5, s - e.deltaY * 0.001)));
  };

  const handleMouseDown = (e) => {
    setDragging(true);
    setStartPos({ x: e.clientX - pos.x, y: e.clientY - pos.y });
  };

  const handleMouseMove = (e) => {
    if (!dragging) return;
    setPos({ x: e.clientX - startPos.x, y: e.clientY - startPos.y });
  };

  return (
    <div
      className="fixed inset-0 bg-black bg-opacity-90 flex items-center justify-center z-50"
      onWheel={handleWheel}
      onMouseDown={handleMouseDown}
      onMouseMove={handleMouseMove}
      onMouseUp={() => setDragging(false)}
      onClick={onClose}
    >
      <button className="absolute top-4 right-4 text-white text-3xl z-10" onClick={onClose}>✕</button>
      <img
        src={src} alt={alt}
        style={{ transform: `translate(${pos.x}px, ${pos.y}px) scale(${scale})`, cursor: dragging ? 'grabbing' : 'grab', maxWidth: '90vw', maxHeight: '90vh', userSelect: 'none' }}
        onClick={e => e.stopPropagation()}
        draggable={false}
      />
    </div>
  );
};

// ── components/ObservationsPage ────────────────────────────────────────────
const ObservationsPage = ({ observations, setObservations }) => {
  const [filter, setFilter] = useState('');
  const [typeFilter, setTypeFilter] = useState('All');
  const [showForm, setShowForm] = useState(false);
  const [editObs, setEditObs] = useState(null);
  const [detailObs, setDetailObs] = useState(null);

  const filtered = useMemo(() => observations.filter(o => {
    const matchText = o.objectName.toLowerCase().includes(filter.toLowerCase()) ||
      o.description?.toLowerCase().includes(filter.toLowerCase());
    const matchType = typeFilter === 'All' || o.type === typeFilter;
    return matchText && matchType;
  }), [observations, filter, typeFilter]);

  const handleSave = (obs) => {
    setObservations(prev => {
      const exists = prev.find(o => o.id === obs.id);
      if (exists) return prev.map(o => o.id === obs.id ? obs : o);
      return [...prev, obs];
    });
    setShowForm(false);
    setEditObs(null);
  };

  const handleToggleFav = (id) => {
    setObservations(prev => prev.map(o => o.id === id ? { ...o, isFavorite: !o.isFavorite } : o));
  };

  const handleDelete = (id) => {
    if (window.confirm('Delete this observation?')) {
      setObservations(prev => prev.filter(o => o.id !== id));
      setDetailObs(null);
    }
  };

  return (
    <div className="space-y-6">
      <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
        <div>
          <h2 className="text-3xl font-bold text-white">My Observations</h2>
          <p className="text-slate-400 mt-1">{filtered.length} of {observations.length} objects</p>
        </div>
        <button onClick={() => { setEditObs(null); setShowForm(true); }}
          className="bg-cyan-600 hover:bg-cyan-700 text-white font-bold px-4 py-2 rounded-md transition-colors">
          + Add Observation
        </button>
      </div>

      <div className="flex flex-col sm:flex-row gap-3">
        <input
          value={filter} onChange={e => setFilter(e.target.value)}
          placeholder="Search observations..."
          className="flex-1 bg-slate-700 border border-slate-600 rounded-md p-2 text-white focus:outline-none focus:border-cyan-500"
        />
        <select value={typeFilter} onChange={e => setTypeFilter(e.target.value)}
          className="bg-slate-700 border border-slate-600 rounded-md p-2 text-white">
          <option value="All">All Types</option>
          {Object.values(ObjectType).map(t => <option key={t}>{t}</option>)}
        </select>
      </div>

      {filtered.length === 0 ? (
        <div className="text-center py-20 text-slate-400">
          <p className="text-4xl mb-4">🔭</p>
          <p>No observations found. Start logging!</p>
        </div>
      ) : (
        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
          {filtered.map(obs => (
            <div key={obs.id} onClick={() => setDetailObs(obs)} className="cursor-pointer">
              <ObservationCard
                observation={obs}
                onEdit={(o) => { setEditObs(o); setShowForm(true); }}
                onToggleFavorite={handleToggleFav}
              />
            </div>
          ))}
        </div>
      )}

      {showForm && (
        <AddObservationForm
          observation={editObs}
          onSave={handleSave}
          onClose={() => { setShowForm(false); setEditObs(null); }}
        />
      )}
      {detailObs && (
        <ObservationDetailModal
          observation={detailObs}
          onClose={() => setDetailObs(null)}
          onEdit={(o) => { setDetailObs(null); setEditObs(o); setShowForm(true); }}
        />
      )}
    </div>
  );
};

const HomePage = ({ observations, setObservations, apiKey }) => {

  const handleSearch = async (e) => {
    e.preventDefault();

      const objects = await getVisibleObjects(location, date, time, catalog, apiKey);

      dec: obj.dec || '',

      distanceValue: String(obj.distanceValue || ''),
      distanceUnit: obj.distanceUnit || DistanceUnit.LightYears,
      description: obj.description || '',
      imageUrl: obj.imageUrl || '',

    alert(`${obj.name} added to your observations!`);

  return (
    <div className="space-y-8">
      <div>
        <h2 className="text-3xl font-bold text-white">What's Visible Tonight?</h2>
        <p className="text-slate-300 mt-2">Use AI to discover celestial objects visible from your location.</p>
        {!apiKey && (
          <div className="mt-3 p-3 bg-yellow-900/50 border border-yellow-600 rounded-lg text-yellow-200 text-sm">

          </div>
        )}

      <form onSubmit={handleSearch} className="bg-slate-800 p-6 rounded-lg shadow-lg space-y-4">
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label className="text-sm text-slate-300 block mb-1">Location *</label>
            <input value={location} onChange={e => setLocation(e.target.value)} placeholder="e.g. Lisbon, Portugal"
              className="w-full bg-slate-700 border border-slate-600 rounded p-2 text-white focus:outline-none focus:border-cyan-500" />
          </div>
          <div>
            <label className="text-sm text-slate-300 block mb-1">Catalog</label>
            <select value={catalog} onChange={e => setCatalog(e.target.value)}
              className="w-full bg-slate-700 border border-slate-600 rounded p-2 text-white">
              {ASTRONOMICAL_CATALOGS.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
            </select>
          </div>
          <div>
            <label className="text-sm text-slate-300 block mb-1">Date</label>
            <input type="date" value={date} onChange={e => setDate(e.target.value)}
              className="w-full bg-slate-700 border border-slate-600 rounded p-2 text-white focus:outline-none focus:border-cyan-500" />
          </div>
          <div>
            <label className="text-sm text-slate-300 block mb-1">Time</label>
            <input type="time" value={time} onChange={e => setTime(e.target.value)}
              className="w-full bg-slate-700 border border-slate-600 rounded p-2 text-white focus:outline-none focus:border-cyan-500" />
          </div>
        </div>
        {error && <p className="text-red-400 text-sm">{error}</p>}
        <button type="submit" disabled={loading || !apiKey}
          className="w-full bg-cyan-600 hover:bg-cyan-700 disabled:bg-slate-600 disabled:cursor-not-allowed text-white font-bold py-2 rounded-md transition-colors">
          {loading ? '🔍 Searching...' : '🔭 Find Visible Objects'}
        </button>
      </form>

      {results.length > 0 && (
        <div>
          <h3 className="text-xl font-semibold text-white mb-4">Visible Objects ({results.length})</h3>
          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
            {results.map((obj, i) => (
              <VisibleObjectCard key={i} obj={obj} onAdd={handleAddToLog} />
            ))}
          </div>
        </div>
      )}
    </div>
  );
};

const getMoonPhase = () => {
  const known = new Date(2000, 0, 6);
  const now = new Date();
  const diff = (now - known) / (1000 * 60 * 60 * 24);
  const cycle = 29.53058867;
  const phase = ((diff % cycle) + cycle) % cycle;
  if (phase < 1.85) return { emoji: '🌑', name: 'New Moon' };
  if (phase < 7.38) return { emoji: '🌒', name: 'Waxing Crescent' };
  if (phase < 9.22) return { emoji: '🌓', name: 'First Quarter' };
  if (phase < 14.77) return { emoji: '🌔', name: 'Waxing Gibbous' };
  if (phase < 16.61) return { emoji: '🌕', name: 'Full Moon' };
  if (phase < 22.15) return { emoji: '🌖', name: 'Waning Gibbous' };
  if (phase < 23.99) return { emoji: '🌗', name: 'Last Quarter' };
  return { emoji: '🌘', name: 'Waning Crescent' };
};

const CalendarPage = ({ observations }) => {
  const [currentDate, setCurrentDate] = useState(new Date());
  const [selectedDate, setSelectedDate] = useState(null);

  const observationDates = useMemo(() => {
    const dates = new Set();
    observations.forEach(obs => {
      if (obs.observationDate && obs.observationDate.length >= 8) {
        const yyyy = obs.observationDate.slice(4, 8);
        const mm = obs.observationDate.slice(2, 4);
        const dd = obs.observationDate.slice(0, 2);
        dates.add(`${yyyy}-${mm}-${dd}`);
      }
    });
    return dates;
  }, [observations]);

  const eventDates = useMemo(() => {
    const m = new Map();
    ASTRO_EVENTS.forEach(e => m.set(e.date, e));
    return m;
  }, []);

  const upcomingEvents = useMemo(() => {
    const today = new Date(); today.setHours(0, 0, 0, 0);
    const limit = new Date(today); limit.setMonth(today.getMonth() + 4);
    return ASTRO_EVENTS.filter(e => {
      const d = new Date(e.date + 'T00:00:00');
      return d >= today && d <= limit;
    });
  }, []);

  const month = currentDate.getMonth();
  const year = currentDate.getFullYear();
  const firstDay = new Date(year, month, 1).getDay();
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const days = Array.from({ length: daysInMonth }, (_, i) => i + 1);
  const blanks = Array.from({ length: firstDay });
  const weekDays = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];

  return (
    <div className="space-y-8">
      <div>
        <h2 className="text-3xl font-bold text-white">Celestial Calendar</h2>
        <p className="text-slate-300 mt-2">Track major events and your observation history.</p>
      </div>

      <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div className="lg:col-span-2 bg-slate-800 p-6 rounded-lg shadow-lg">
          <div className="flex justify-between items-center mb-4">
            <button onClick={() => setCurrentDate(new Date(year, month - 1, 1))} className="p-2 rounded-full hover:bg-slate-700">‹</button>
            <h3 className="text-xl font-semibold text-cyan-400">
              {currentDate.toLocaleString('default', { month: 'long' })} {year}
            </h3>
            <button onClick={() => setCurrentDate(new Date(year, month + 1, 1))} className="p-2 rounded-full hover:bg-slate-700">›</button>
          </div>
          <div className="grid grid-cols-7 gap-1 text-center">
            {weekDays.map(d => <div key={d} className="font-bold text-slate-400 text-sm">{d}</div>)}
            {blanks.map((_, i) => <div key={`b-${i}`}></div>)}
            {days.map(day => {
              const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
              const isObs = observationDates.has(dateStr);
              const event = eventDates.get(dateStr);
              let cls = "h-14 flex items-center justify-center text-sm rounded-lg transition-colors ";
              if (isObs && event) cls += "bg-gradient-to-br from-purple-500 to-cyan-500 text-white font-bold cursor-pointer";
              else if (isObs) cls += "bg-cyan-600/70 hover:bg-cyan-500 text-white font-semibold cursor-pointer";
              else if (event) cls += "bg-purple-600/70 hover:bg-purple-500 text-white font-semibold cursor-pointer";
              else cls += "bg-slate-700/50 text-slate-300";
              return (
                <div key={day} className={cls} title={event?.name}
                  onClick={() => (isObs || event) && setSelectedDate(dateStr)}>
                  {day}
                </div>
              );
            })}
          </div>
          <div className="mt-4 flex flex-wrap gap-4 text-sm text-slate-300">
            <span className="flex items-center gap-2"><span className="w-4 h-4 rounded bg-cyan-600/70 inline-block"></span>Observation</span>
            <span className="flex items-center gap-2"><span className="w-4 h-4 rounded bg-purple-600/70 inline-block"></span>Event</span>
            <span className="flex items-center gap-2"><span className="w-4 h-4 rounded bg-gradient-to-br from-purple-500 to-cyan-500 inline-block"></span>Both</span>
          </div>
        </div>

        <div className="lg:col-span-1 bg-slate-800 p-6 rounded-lg shadow-lg max-h-[600px] overflow-y-auto">
          <h3 className="text-xl font-semibold text-cyan-400 mb-4">Upcoming Events</h3>
          <ul className="space-y-4">
            {upcomingEvents.length > 0 ? upcomingEvents.map(ev => (
              <li key={ev.name} className="border-l-4 border-purple-500 pl-4">
                <p className="font-bold text-slate-100">{ev.name}</p>
                <p className="text-sm text-slate-400">
                  {new Date(ev.date + 'T00:00:00').toLocaleDateString(undefined, { month: 'long', day: 'numeric', year: 'numeric' })}
                </p>
                <p className="text-sm text-slate-300 mt-1">{ev.description}</p>
              </li>
            )) : <li className="text-slate-400">No major events in the next four months.</li>}
          </ul>
        </div>
      </div>

      {selectedDate && (
        <DayDetailsModal
          date={selectedDate}
          event={eventDates.get(selectedDate)}
          observations={observations.filter(obs => {
            if (!obs.observationDate || obs.observationDate.length < 8) return false;
            const yyyy = obs.observationDate.slice(4, 8);
            const mm = obs.observationDate.slice(2, 4);
            const dd = obs.observationDate.slice(0, 2);
            return `${yyyy}-${mm}-${dd}` === selectedDate;
          })}
          onClose={() => setSelectedDate(null)}
        />
      )}
    </div>
  );
};

// ── components/SettingsPage ────────────────────────────────────────────────
const SettingsPage = ({ observations, setObservations, apiKey, setApiKey }) => {
  const fileInputRef = useRef(null);
  const [keyInput, setKeyInput] = useState(apiKey || '');

  const handleSave = () => {
    const dataStr = JSON.stringify(observations, null, 2);
    const uri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
    const a = document.createElement('a');
    a.setAttribute('href', uri);
    a.setAttribute('download', 'AstroLog_Observations.json');
    a.click();
  };

  const handleFileChange = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        if (!Array.isArray(data)) throw new Error('Not an array');
        setObservations(data);
        alert(`${data.length} observations loaded!`);
      } catch (err) {
        alert('Failed to load: ' + err.message);
      }
      if (fileInputRef.current) fileInputRef.current.value = '';
    };
    reader.readAsText(file);
  };

  const handleSaveKey = () => {
    setApiKey(keyInput.trim());
    localStorage.setItem('gemini_api_key', keyInput.trim());
    alert('API key saved!');
  };

  return (
    <div className="space-y-8 max-w-2xl mx-auto">
      <div>
        <h2 className="text-3xl font-bold text-white">Settings</h2>
        <p className="text-slate-300 mt-2">Manage your application data and preferences.</p>
      </div>

      <div className="bg-slate-800 p-6 rounded-lg shadow-lg space-y-4">
        <h3 className="text-xl font-semibold text-cyan-400">Gemini API Key</h3>
        <p className="text-slate-400 text-sm">Required to use the "What's Visible Tonight?" feature. Get a free key at <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener noreferrer" className="text-cyan-400 underline">Google AI Studio</a>.</p>
        <div className="flex gap-2">
          <input
            type="password"
            value={keyInput}
            onChange={e => setKeyInput(e.target.value)}
            placeholder="AIza..."
            className="flex-1 bg-slate-700 border border-slate-600 rounded p-2 text-white focus:outline-none focus:border-cyan-500"
          />
          <button onClick={handleSaveKey} className="bg-cyan-600 hover:bg-cyan-700 text-white px-4 py-2 rounded transition-colors">Save</button>
        </div>
        {apiKey && <p className="text-green-400 text-sm">✓ API key is set</p>}
      </div>

      <div className="bg-slate-800 p-6 rounded-lg shadow-lg space-y-4">
        <h3 className="text-xl font-semibold text-cyan-400">Data Management</h3>
        <div className="flex flex-col sm:flex-row gap-4">
          <button onClick={handleSave}
            className="flex-1 bg-cyan-600 hover:bg-cyan-700 text-white font-bold py-2 px-4 rounded-md transition-colors">
            Save Observations to File
          </button>
          <button onClick={() => fileInputRef.current?.click()}
            className="flex-1 bg-slate-600 hover:bg-slate-500 text-white font-bold py-2 px-4 rounded-md transition-colors">
            Load Observations from File
          </button>
          <input type="file" ref={fileInputRef} onChange={handleFileChange} accept=".json" className="hidden" />
        </div>
      </div>
    </div>
  );
};

// ── App ────────────────────────────────────────────────────────────────────
const App = () => {
  const [activeTab, setActiveTab] = useState(Tab.Home);
  const [observations, setObservations] = useState(() => {
    try {
      const saved = localStorage.getItem('astrolog_observations');
      return saved ? JSON.parse(saved) : INITIAL_OBSERVATIONS;
    } catch { return INITIAL_OBSERVATIONS; }
  });
  const [apiKey, setApiKey] = useState(() => localStorage.getItem('gemini_api_key') || '');

  useEffect(() => {
    try { localStorage.setItem('astrolog_observations', JSON.stringify(observations)); } catch {}
  }, [observations]);

  const renderTab = () => {
    switch (activeTab) {
      case Tab.Home:
        return <HomePage observations={observations} setObservations={setObservations} apiKey={apiKey} />;
      case Tab.Observations:
        return <ObservationsPage observations={observations} setObservations={setObservations} />;
      case Tab.Resources:
        return <ResourcesPage />;
      case Tab.Calendar:
        return <CalendarPage observations={observations} />;
      case Tab.Settings:
        return <SettingsPage observations={observations} setObservations={setObservations} apiKey={apiKey} setApiKey={setApiKey} />;
      default:
        return null;
    }
  };

  return (
    <div className="min-h-screen bg-slate-900">
      <Header activeTab={activeTab} setActiveTab={setActiveTab} />
      <main className="max-w-7xl mx-auto px-4 py-8">
        {renderTab()}
      </main>
    </div>
  );
};

// ── Render ─────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
